<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Mob Deals banner</title>
  <desc id="desc">Mob Deals South Yorkshire SIM-only comparison banner with phone icon and feature badges.</desc>
  <defs>
    <radialGradient id="glowPurple" cx="80%" cy="0%" r="75%">
      <stop stop-color="#7c3aed" stop-opacity="0.7"/>
      <stop offset="0.72" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="8%" cy="92%" r="70%">
      <stop stop-color="#34d399" stop-opacity="0.25"/>
      <stop offset="0.68" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#09090b"/>
  <rect width="1200" height="630" fill="url(#glowPurple)"/>
  <rect width="1200" height="630" fill="url(#glowGreen)"/>

  <g filter="url(#shadow)">
    <rect x="64" y="64" width="1072" height="502" rx="46" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)"/>
  </g>

  <!-- Icon tile -->
  <rect x="108" y="112" width="108" height="108" rx="30" fill="url(#brand)"/>
  <rect x="142" y="133" width="40" height="66" rx="10" fill="#09090b" opacity="0.92"/>
  <rect x="151" y="144" width="22" height="36" rx="5" fill="#ffffff" opacity="0.95"/>
  <circle cx="162" cy="190" r="3.5" fill="#ffffff" opacity="0.95"/>
  <path d="M188 147h12M188 162h22M188 177h15" stroke="#09090b" stroke-width="7" stroke-linecap="round" opacity="0.92"/>
  <path d="M132 208c22-12 42-12 64 0" fill="none" stroke="#09090b" stroke-width="7" stroke-linecap="round" opacity="0.52"/>

  <!-- Header copy -->
  <text x="248" y="154" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="900" letter-spacing="-1.5">Mob Deals</text>
  <text x="250" y="198" fill="#c4b5fd" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="750">South Yorkshire SIM-only comparison</text>

  <!-- Main copy: kept comfortably inside the card -->
  <text x="108" y="334" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="950" letter-spacing="-3.5">Compare SIM-only</text>
  <text x="108" y="414" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="950" letter-spacing="-3.5">deals responsibly.</text>
  <text x="112" y="474" fill="#b9b9c0" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="600">Transparent provider links • accessible UI • fast static pages</text>

  <!-- Feature chips -->
  <g font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">
    <rect x="108" y="508" width="190" height="42" rx="21" fill="rgba(167,139,250,0.16)" stroke="rgba(167,139,250,0.35)"/>
    <text x="132" y="536" fill="#ddd6fe">SEO-ready</text>
    <rect x="318" y="508" width="205" height="42" rx="21" fill="rgba(52,211,153,0.14)" stroke="rgba(52,211,153,0.34)"/>
    <text x="342" y="536" fill="#bbf7d0">Accessible</text>
    <rect x="543" y="508" width="225" height="42" rx="21" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
    <text x="567" y="536" fill="#e4e4e7">GitHub Pages</text>
  </g>
</svg>
