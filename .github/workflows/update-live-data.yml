name: Update live public source checks

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * *'

permissions:
  contents: write

jobs:
  update-live-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Refresh provider source reachability data
        run: python scripts/update_live_data.py
      - name: Commit updated live data
        run: |
          if git diff --quiet data/live-sources.json; then
            echo "No live source changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live-sources.json
          git commit -m "Update live provider source checks"
          git push
